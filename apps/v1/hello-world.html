<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web/src/regular/style.css" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>hello-world</title>
  </head>
  <body>
    <v-keyboard></v-keyboard>

    <div id="tb" inert></div>
    <div id="sa" inert></div>
    <div id="kb" inert></div>
    <div id="dv" inert></div>
    <div id="sv" inert></div>
    <div id="lv" inert></div>

    <div id="console" popover="manual" inert>
      <span id="console0"></span>, <span id="console1"></span>, <span id="console2"></span>, <span id="console3"></span>,
      <span id="console4"></span>
    </div>

    <navigation-stack>
      <scroll-view>
        <v-stack>
          <button is="borderless-button" type="button">Hello world</button>
        </v-stack>
      </scroll-view>
    </navigation-stack>

    <script type="module" src="main.js"></script>

    <nav popover>
      <a href="index.html">Back</a>
    </nav>
    <script type="module">
      document.querySelector('nav[popover]').showPopover()
    </script>
  </body>
</html>
