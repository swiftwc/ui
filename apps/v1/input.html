    <v-keyboard></v-keyboard>

    <navigation-stack>
      <scroll-view>
        <h-stack template="repeat(4,minmax(0,1fr))" placement="fill leading">
          <v-stack placement="leading fill" style="background-color: white">
            <script>
              document.currentScript.replaceWith(document.querySelector('#template').content.cloneNode(true))

          </v-stack>
          <v-stack placement="leading fill" style="background-color: white">
            <script>
              document.currentScript.replaceWith(document.querySelector('#template').content.cloneNode(true))

            </script>
          </v-stack>

        </tool-bar-item>
      </tool-bar>

    <script type="module">
      import '/main.js'

      document.addEventListener('input', (evt) => {
        console.debug(`⚡️ ${event?.type}`)

        if (evt.target.closest('[name=ff]')) {
          console.log(99, evt)
          const value = evt.target.value
          // Arbitrary check
          if (value.includes('bad')) {
            evt.target.setCustomValidity("Value cannot contain 'bad'")
          } else {
            evt.target.setCustomValidity('') // clears the custom error
          }
          // Optional: trigger immediate invalid UI
          // evt.target.reportValidity()
        } else if (evt.target.closest('text-field')) {
          console.log(88, evt)
          const value = evt.target.value
          // Arbitrary check
          if (value.includes('bad')) {
            evt.target.setCustomValidity("Value cannot contain 'bad'")
          } else {
            evt.target.setCustomValidity('') // clears the custom error
          }
          // Optional: trigger immediate invalid UI
          // evt.target.reportValidity()
        }
      })

      document.addEventListener('submit', (evt) => {
        console.debug(`⚡️ ${event?.type}`)

        evt.preventDefault()

        const form = evt.target
        const formData = new FormData(form)

        const data = Object.fromEntries(formData.entries())

        // console.log(data.get('email')) // single field

        console.log(22, evt, data, form.checkValidity()) //
      })

      for (const [i, el] of Array.from(document.querySelectorAll('scroll-view > h-stack > v-stack')).entries())
        el.querySelector(`h-stack > button:nth-child(${i + 1})`).click()

      document.addEventListener('click', async (event) => {
        console.debug(`⚡️ ${event?.type}`)

        const btn = event.target.closest('button'),
          summary = event.target.closest('summary:has(button)')

        if (summary) {
          event.preventDefault()

          if (btn) return summary.closest('details').toggleAttribute('open')

          summary.setAttribute('aria-selected', `${`true` !== summary.getAttribute('aria-selected')}`)
        } else if (btn) {
          btn.setAttribute('aria-selected', `${`true` !== btn.getAttribute('aria-selected')}`)
        }
      })
    </script>
