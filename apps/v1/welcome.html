    <script type="module">
      import { startViewTransition, queryLandmark, queryRoot, queryFrameToolbars, queryInsertPosition } from '../../packages/ui/js/client'

      document.addEventListener('click', async (event) => {
        console.debug(`⚡️ click`)

        const sv = queryLandmark(event.target),
          { root } = queryRoot(sv),
          { scene, frame } = queryFrameToolbars(sv),
          position = queryInsertPosition(frame),
          lookFor = 'beforebegin' === position ? 'previousElementSibling' : 'nextElementSibling'

        if (event.target.closest('.lang'))
          await startViewTransition(event, 'forwards', async () => {
            if (!['BODY-VIEW', 'DIALOG'].includes(scene[lookFor]?.tagName)) {

                position,
                `<body-view>
          <scroll-view navigation-title="Select Your Country or Region">
